name: 🔍 CI Checks (Vercel deploys automatically)

# NOTE: Vercel watches your GitHub repo and deploys automatically on every
# push to main. These workflows are kept as a safety net to catch broken
# builds or failing tests BEFORE Vercel deploys them.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Test Backend
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 4000
          FRONTEND_URL: http://localhost:5173
          RESEND_API_KEY: ""
          CONTACT_RECEIVER: test@example.com

  # ─────────────────────────────────────────────
  # JOB 2 — Build Frontend (verify it compiles)
  # ─────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: test-backend

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          # Placeholder — real value lives in Vercel dashboard
          VITE_API_URL: https://portfolio-backend-johndoe.vercel.app
