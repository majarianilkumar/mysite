name: 🔍 PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    name: 🎨 Lint Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm test
        env:
          NODE_ENV: test
          PORT: 4000
          FRONTEND_URL: http://localhost:5173
          RESEND_API_KEY: ""
          CONTACT_RECEIVER: test@example.com

  build-check:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-backend]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: https://portfolio-backend-johndoe.vercel.app
